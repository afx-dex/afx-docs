openapi: 3.0.3
info:
  title: AFX DEX WebSocket API
  version: 1.0.0
  description: |
    Real-time market data and account updates via WebSocket.

    **Connection URL:** `wss://ws10.afx.xyz/ws/dex`

    **Protocol:**
    - Send `subscribe` / `unsubscribe` / `ping` messages as JSON
    - Server pushes data on `channel` field
    - Server sends `pong` in response to `ping`
    - Idle connections are closed after 60s — use `ping` as heartbeat

    **Rate Limits:**
    | Limit | Value |
    |-------|-------|
    | Max connections per IP | 10 |
    | Max subscriptions per connection | 50 |
    | Max messages per second | 50 |

servers:
  - url: wss://ws10.afx.xyz/ws/dex
    description: Mainnet
  - url: wss://ws10-testnet.afx.xyz/ws/dex
    description: Testnet

paths:
  # ═══════════════════════════════════════════════════════════════════
  #  Connection
  # ═══════════════════════════════════════════════════════════════════
  /ws/ping:
    post:
      operationId: wsPing
      summary: Ping / Pong
      tags: [Connection]
      description: |
        Send a heartbeat to keep the connection alive.

        ```json
        { "method": "ping" }
        ```
      responses:
        "200":
          description: Pong
          content:
            application/json:
              example: { "channel": "pong" }
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            const ws = new WebSocket("wss://ws10.afx.xyz/ws/dex");

            ws.onopen = () => {
              // Heartbeat every 30s
              setInterval(() => ws.send(JSON.stringify({ method: "ping" })), 30000);
            };

            ws.onmessage = (event) => {
              const msg = JSON.parse(event.data);
              if (msg.channel === "pong") return;
              console.log("data:", msg);
            };
        - lang: Python
          label: Python
          source: |
            import asyncio, json, websockets

            async def main():
                async with websockets.connect("wss://ws10.afx.xyz/ws/dex") as ws:
                    await ws.send(json.dumps({"method": "ping"}))
                    print(json.loads(await ws.recv()))  # {"channel": "pong"}

            asyncio.run(main())

  # ═══════════════════════════════════════════════════════════════════
  #  Market Data
  # ═══════════════════════════════════════════════════════════════════
  /ws/subscribe/orderBook:
    post:
      operationId: wsOrderBook
      summary: Order Book
      tags: [Market Data]
      description: |
        Subscribe to order book depth updates. Sends initial snapshot then incremental deltas.

        ```json
        { "method": "subscribe", "subscription": { "type": "orderBook", "symbol": "BTCUSDC", "depth": 50 } }
        ```

        | Param | Type | Required | Description |
        |-------|------|----------|-------------|
        | symbol | string | Yes | Symbol name |
        | depth | integer | No | Depth level (default 5) |
      responses:
        "200":
          description: Push data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderBookPush"
              example:
                channel: orderBook
                data:
                  type: snapshot
                  symbolCode: 1
                  symbol: BTCUSDC
                  block: 16105909
                  sequence: 3846532
                  depth: 5
                  timestamp: 1776920283896
                  book:
                    bids: [["77907", "0.159"], ["77906.5", "0.093"]]
                    asks: [["77908", "0.120"], ["77908.5", "0.085"]]
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            ws.send(JSON.stringify({
              method: "subscribe",
              subscription: { type: "orderBook", symbol: "BTCUSDC", depth: 50 },
            }));

            ws.onmessage = (event) => {
              const msg = JSON.parse(event.data);
              if (msg.channel === "orderBook") {
                console.log("bids:", msg.data.book.bids);
                console.log("asks:", msg.data.book.asks);
              }
            };
        - lang: Python
          label: Python
          source: |
            await ws.send(json.dumps({
                "method": "subscribe",
                "subscription": {"type": "orderBook", "symbol": "BTCUSDC", "depth": 50},
            }))

