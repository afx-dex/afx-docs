  # ═══════════════════════════════════════════════════════════════════
  #  Unsubscribe
  # ═══════════════════════════════════════════════════════════════════
  /ws/unsubscribe:
    post:
      operationId: wsUnsubscribe
      summary: Unsubscribe
      tags: [Connection]
      description: |
        Unsubscribe from a channel. Send the same `subscription` object used to subscribe.

        **Request:**
        ```json
        {
          "method": "unsubscribe",
          "subscription": { "type": "orderBook", "symbol": "BTCUSDC", "depth": 50 }
        }
        ```

        **Response:**
        ```json
        {
          "method": "unsubscribe",
          "success": true,
          "subject": "orderBook.BTCUSDC.50"
        }
        ```
      responses:
        "200":
          description: Unsubscribed
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            ws.send(JSON.stringify({
              method: "unsubscribe",
              subscription: { type: "orderBook", symbol: "BTCUSDC", depth: 50 },
            }));
        - lang: Python
          label: Python
          source: |
            await ws.send(json.dumps({
                "method": "unsubscribe",
                "subscription": {"type": "orderBook", "symbol": "BTCUSDC", "depth": 50},
            }))
