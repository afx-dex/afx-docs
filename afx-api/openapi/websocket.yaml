  # ═══════════════════════════════════════════════════════════════════
  #  Unsubscribe
  # ═══════════════════════════════════════════════════════════════════
  /ws/unsubscribe:
    post:
      operationId: wsUnsubscribe
      summary: Unsubscribe
      tags: [Connection]
      description: |
        Unsubscribe from a channel. Send the same `subscription` object used to subscribe.

        ```json
        { "method": "unsubscribe", "subscription": { "type": "orderBook", "symbol": "BTCUSDC", "depth": 50 } }
        ```
      responses:
        "200":
          description: Ack
          content:
            application/json:
              example:
                method: unsubscribe
                success: true
                subject: "orderBook.BTCUSDC.50"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            ws.send(JSON.stringify({
