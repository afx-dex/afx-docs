        |-------|------|----------|-------------|
        | symbol | string | Yes | Symbol name |
        | interval | string | Yes | Interval in seconds ("60", "300", "900", "3600", "86400") |
      responses:
        "200":
          description: Push data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandlePush"
              example:
                channel: candle
                data:
                  symbolName: BTCUSDC
                  timestamp: 1776920280
                  intrvl: 60
                  open: "77900.5"
                  high: "77950.0"
                  low: "77880.0"
                  close: "77920.3"
                  volume: "12.530"
                  turnover: "976234.5"
                  tradeCount: 48
