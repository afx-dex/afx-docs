  /ws/subscribe/aopState:
    post:
      operationId: wsAopState
      summary: Account / Order / Position State
      tags: [User Data]
      description: |
        Subscribe to real-time account, order, and position state updates.

        ```json
        { "method": "subscribe", "subscription": { "type": "aopState", "userAddress": "0xabc..." } }
        ```

        | Param | Type | Required |
        |-------|------|----------|
        | userAddress | string | Yes |
      responses:
        "200":
          description: Push data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AopStatePush"
              example:
                channel: aopState
                data:
                  type: snapshot
                  sequence: 123456
                  timestamp: 1776920283000
                  userAddr: "0xabc..."
                  aop:
                    accounts:
                      - userAddr: "0xabc..."
                        currency: 1
                        balance: "10000.00"
                        availableBalance: "8500.00"
                        availableTransferBalance: "8500.00"
                        equity: "10500.00"
                        status: "NORMAL"
                        takerFeeRatio: "0.0006"
                        makerFeeRatio: "0.0001"
                    orders:
                      - userAddr: "0xabc..."
                        symbol: BTCUSDC
                        ordId: 12345
                        clOrdId: 0
                        ordPx: "77000.0"
                        ordQty: "0.5"
                        ordStatus: NEW
                        ordType: LIMIT
                        ordSide: BUY
                        timeInForce: GTC
                        filledQty: "0"
                        leavesQty: "0.5"
                        cumFilledValue: "0"
                    positions:
                      - userAddr: "0xabc..."
                        symbolCode: 1
                        symbol: BTCUSDC
                        leverage: "10"
                        longSize: "0.5"
                        longEntryValue: "38750.0"
                        shortSize: "0"
                        shortEntryValue: "0"
                        posMode: ONE_WAY
                        posMarginMode: CROSS
                        assignedPosBalance: "0"
                        unrealizedPnl: "250.00"
                        cumRealizedPnl: "100.00"
                        curMarkPx: "77920.3"
                        cumTransactionFee: "5.00"
                        marginTableId: 1
                    settings:
                      - symbol: BTCUSDC
                        leverage: ["ONE_WAY", "10"]
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            ws.send(JSON.stringify({
              method: "subscribe",
              subscription: { type: "aopState", userAddress: "0xabc..." },
            }));

            ws.onmessage = (event) => {
              const msg = JSON.parse(event.data);
              if (msg.channel === "aopState") {
                const { accounts, orders, positions } = msg.data.aop;
                console.log("accounts:", accounts);
                console.log("orders:", orders);
                console.log("positions:", positions);
              }
            };
        - lang: Python
          label: Python
          source: |
            await ws.send(json.dumps({
                "method": "subscribe",
                "subscription": {"type": "aopState", "userAddress": "0xabc..."},
            }))

