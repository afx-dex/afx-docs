  /ws/subscribe/aopState:
    post:
      operationId: wsAopState
      summary: Account / Order / Position State
      tags: [User Data]
      description: |
        Subscribe to real-time account, order, and position state updates.

        **Subscribe:**
        ```json
        {
          "method": "subscribe",
          "subscription": { "type": "aopState", "userAddress": "0xabc..." }
        }
        ```

        **Push data:**
        ```json
        {
          "channel": "aopState",
          "data": {
            "type": "snapshot",
            "sequence": 123456,
            "timestamp": 1776920283000,
            "userAddr": "0xabc...",
            "aop": {
              "accounts": [{
                "userAddr": "0xabc...",
                "currency": 1,
                "balance": "10000.00",
                "availableBalance": "8500.00",
                "equity": "10500.00",
                "status": "NORMAL"
              }],
              "orders": [{
                "userAddr": "0xabc...",
                "symbol": "BTCUSDC",
                "ordId": 12345,
                "ordPx": "77000.0",
                "ordQty": "0.5",
                "ordStatus": "NEW",
                "ordType": "LIMIT",
                "ordSide": "BUY",
                "timeInForce": "GTC",
                "filledQty": "0",
                "leavesQty": "0.5"
              }],
              "positions": [{
                "userAddr": "0xabc...",
                "symbolCode": 1,
                "symbol": "BTCUSDC",
                "leverage": "10",
                "longSize": "0.5",
                "longEntryValue": "38750.0",
                "shortSize": "0",
                "posMode": "ONE_WAY",
                "posMarginMode": "CROSS",
                "unrealizedPnl": "250.00",
                "cumRealizedPnl": "100.00",
                "curMarkPx": "77920.3"
              }],
              "settings": [{
                "symbol": "BTCUSDC",
                "leverage": ["ONE_WAY", "10"]
              }]
            }
          }
        }
        ```

        | Param | Type | Required | Description |
        |-------|------|----------|-------------|
        | userAddress | string | Yes | User wallet address |
      responses:
        "200":
          description: Subscribed
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            ws.send(JSON.stringify({
              method: "subscribe",
              subscription: { type: "aopState", userAddress: "0xabc..." },
            }));

            ws.onmessage = (event) => {
              const msg = JSON.parse(event.data);
              if (msg.channel === "aopState") {
                const { accounts, orders, positions } = msg.data;
                console.log("accounts:", accounts);
                console.log("orders:", orders);
                console.log("positions:", positions);
              }
            };
        - lang: Python
          label: Python
          source: |
            await ws.send(json.dumps({
                "method": "subscribe",
                "subscription": {"type": "aopState", "userAddress": "0xabc..."},
            }))

            async for message in ws:
                msg = json.loads(message)
                if msg.get("channel") == "aopState":
                    print("accounts:", msg["data"].get("accounts"))
                    print("orders:", msg["data"].get("orders"))
                    print("positions:", msg["data"].get("positions"))

