  /ws/subscribe/aopState:
    post:
      operationId: wsAopState
      summary: Account / Order / Position State
      tags: [User Data]
      description: |
        Subscribe to real-time account, order, and position state updates.

        **Subscribe:**
        ```json
        {
          "method": "subscribe",
          "subscription": { "type": "aopState", "userAddress": "0xabc..." }
        }
        ```

        | Param | Type | Required | Description |
        |-------|------|----------|-------------|
        | userAddress | string | Yes | User wallet address |
      responses:
        "200":
          description: Subscribed
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            ws.send(JSON.stringify({
              method: "subscribe",
              subscription: { type: "aopState", userAddress: "0xabc..." },
            }));

            ws.onmessage = (event) => {
              const msg = JSON.parse(event.data);
              if (msg.channel === "aopState") {
                const { accounts, orders, positions } = msg.data;
                console.log("accounts:", accounts);
                console.log("orders:", orders);
                console.log("positions:", positions);
              }
            };
        - lang: Python
          label: Python
          source: |
            await ws.send(json.dumps({
                "method": "subscribe",
                "subscription": {"type": "aopState", "userAddress": "0xabc..."},
            }))

            async for message in ws:
                msg = json.loads(message)
                if msg.get("channel") == "aopState":
                    print("accounts:", msg["data"].get("accounts"))
                    print("orders:", msg["data"].get("orders"))
                    print("positions:", msg["data"].get("positions"))

