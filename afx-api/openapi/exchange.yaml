      operationId: vaultCreateSubVault
      summary: Create Sub-Vault
      tags: [Vault]
      description: |
        Create a sub-vault under a parent vault. Parent vault specified via outer `vaultAddress` field.

        **Signature:** Agent · **Protobuf:** `MsgVaultCreateSubVault`

        ```protobuf
        message MsgVaultCreateSubVault {}  // empty message
        ```
      requestBody:
        required: true
        content:
          application/json:
            examples:
              default:
                value:
                  action:
                    type: vaultCreateSubVault
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
                  vaultAddress: "0x4b90BBE5..."
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            // Parent vault address is required
            await client.vaultCreateSubVault({ vaultAddress: "0x4b90BBE5..." });
        - lang: Python
          label: Python
          source: |
            # Parent vault address is required
            # (not yet in SDK — use raw agent_sign_and_send)

  /exchange/vaultDeposit:
    post:
      operationId: vaultDeposit
      summary: Vault Deposit
