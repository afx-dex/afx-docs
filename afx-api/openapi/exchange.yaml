                  action:
                    type: vaultWithdraw
                    amount: "50"
                    currencyCode: 1
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
                  vaultAddress: "0x4b90BBE5..."
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            await client.vaultWithdraw({ vaultAddress: "0x4b90BBE5...", amount: "50" });
        - lang: Python
          label: Python
          source: |
            client.vault_withdraw(vault_address="0x4b90BBE5...", amount="50")

