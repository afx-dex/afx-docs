      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            await client.vaultPreWithdraw({ vaultAddress: "0x4b90BBE5...", amount: "50" });
        - lang: Python
          label: Python
          source: |
            # vaultPreWithdraw uses same pattern as vaultWithdraw
            client.vault_withdraw(vault_address="0x4b90BBE5...", amount="50")

  /exchange/vaultRebalance:
    post:
      operationId: vaultRebalance
      summary: Vault Rebalance
      tags: [Vault]
      description: |
        Rebalance funds between vaults. Outer `vaultAddress` specifies the main vault.

        **Signature:** Agent · **Protobuf:** `MsgVaultRebalance`

        ```protobuf
        message MsgVaultRebalance {
          string from          = 1;
          string to            = 2;
          string amount        = 3;
          int64  currency_code = 4;
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            examples:
              default:
                value:
                  action:
                    type: vaultRebalance
                    from: "0xSubVault1..."
                    to: "0xSubVault2..."
                    amount: "500"
                    currencyCode: 1
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
                  vaultAddress: "0xMainVault..."
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            await client.vaultRebalance({
              vaultAddress: "0xMainVault...",
              from: "0xSubVault1...", to: "0xSubVault2...",
              amount: "500",
            });
        - lang: Python
          label: Python
          source: |
            # vaultRebalance — use raw API or extend SDK
            # client._agent_sign_and_send(action, proto, vault_address=...)

