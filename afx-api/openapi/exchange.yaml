openapi: 3.0.3
info:
  title: AFX DEX Exchange API
  version: 1.0.0
  description: |
    All trading operations are submitted through `POST /api/v1/exchange`, routed by `action.type`.
    Every request must include an EIP-712 signature. See the **Signature** page for details.

servers:
  - url: https://api10.afx.xyz
    description: Mainnet
  - url: https://api10-testnet.afx.xyz
    description: Testnet

paths:
  # ═══════════════════════════════════════════════════════════════════
  #  Orders
  # ═══════════════════════════════════════════════════════════════════
  /exchange/placeOrder:
    post:
      operationId: placeOrder
      summary: Place Order
      tags: [Orders]
      description: |
        Submit one or more orders. Supports limit, market, and conditional (TP/SL) orders.

        **Signature:** Agent · **Protobuf:** `MsgPlaceOrders`

        ```protobuf
        message MsgPlaceOrder {
          int64  cl_ord_id           = 1;
          int64  symbol_code         = 2;
          string ord_px              = 3;
          string ord_qty             = 4;
          string trigger_px          = 5;
          OrdType                   ord_type           = 6;
          OrdSide                   ord_side           = 7;
          OrdTIF                    time_in_force      = 8;
          ReduceOnlyOption          reduce_only_option = 9;
          int64  parent_ord_id      = 10;
          ConditionalOrdTriggerType tpsl_trigger_type  = 11;
          string slippage_pct       = 12;
        }
        message MsgPlaceOrders {
          repeated MsgPlaceOrder orders = 1;
        }
        ```

        **Enum Reference:**
        | Enum | Values |
        |------|--------|
        | OrdType | LIMIT=1, MARKET=2 |
        | OrdSide | BUY=1, SELL=2, BUY_CLOSE_HEDGE=3, SELL_CLOSE_HEDGE=4 |
        | OrdTIF | GTC=1, IOC=2, FOK=3, POST_ONLY=4 |
        | ReduceOnlyOption | REDUCE_ONLY=1, TP_FROM_POSITION=2, SL_FROM_POSITION=3 |
        | ConditionalOrdTriggerType | LAST_PRICE=1, MARK_PRICE=2, INDEX_PRICE=3 |
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
            examples:
              limitOrder:
                summary: Limit Buy
                value:
                  action:
                    type: placeOrder
                    orders:
                      - symbolCode: 1
                        ordPx: "40000.5"
                        ordQty: "0.5"
                        ordType: LIMIT
                        ordSide: BUY
                        timeInForce: GTC
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
              marketOrder:
                summary: Market Buy
                value:
                  action:
                    type: placeOrder
                    orders:
                      - symbolCode: 1
                        ordPx: "0"
                        ordQty: "0.1"
                        ordType: MARKET
                        ordSide: BUY
                        timeInForce: IOC
                        slippagePct: "1"
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
              stopLoss:
                summary: Stop Loss
                value:
                  action:
                    type: placeOrder
                    orders:
                      - symbolCode: 1
                        ordPx: "0"
                        ordQty: "0"
                        ordType: MARKET
                        ordSide: SELL
                        timeInForce: IOC
                        reduce_only_option: SL_FROM_POSITION
                        triggerPx: "38000"
                        tpslTriggerType: LAST_PRICE
                        slippagePct: "1"
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            import { DexClient } from "./dex_client.mjs";

            const client = await DexClient.create({
              masterKey: "0xYOUR_MASTER_KEY",
              agentKey:  "0xYOUR_AGENT_KEY",
              testnet:   true,
            });

            // Limit buy
            const result = await client.placeOrder({
              symbolCode: 1, px: "40000.5", qty: "0.5",
              side: "BUY", ordType: "LIMIT", tif: "GTC",
            });
            console.log(result);

            // Market buy
            const result2 = await client.placeOrder({
              symbolCode: 1, px: "0", qty: "0.1",
              side: "BUY", ordType: "MARKET", tif: "IOC",
              slippagePct: "1",
            });

            // Stop loss
            const result3 = await client.placeOrder({
              symbolCode: 1, px: "0", qty: "0",
              side: "SELL", ordType: "MARKET", tif: "IOC",
              reduce_only_option: "SL_FROM_POSITION",
              triggerPx: "38000", tpslTriggerType: "LAST_PRICE",
              slippagePct: "1",
            });
        - lang: Python
          label: Python
          source: |
            from dex_client import DexClient

            client = DexClient(
                master_key="0xYOUR_MASTER_KEY",
                agent_key="0xYOUR_AGENT_KEY",
                testnet=True,
            )

            # Limit buy
            result = client.place_order(
                symbol_code=1, px="40000.5", qty="0.5",
                side="BUY", ord_type="LIMIT", tif="GTC",
            )
            print(result)

            # Market buy
            result2 = client.place_order(
                symbol_code=1, px="0", qty="0.1",
                side="BUY", ord_type="MARKET", tif="IOC",
                slippage_pct="1",
            )

  /exchange/cancelOrder:
    post:
      operationId: cancelOrder
      summary: Cancel Order
      tags: [Orders]
      description: |
        Cancel one or more orders by orderId or clOrdId.

        **Signature:** Agent · **Protobuf:** `MsgCancelOrders`

        ```protobuf
        message MsgCancelOrder {
          int64 symbol_code = 1;
          int64 cl_ord_id   = 2;
          int64 ord_id      = 3;
        }
        message MsgCancelOrders {
          repeated MsgCancelOrder orders = 1;
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelOrderRequest"
            examples:
              byOrdId:
                summary: Cancel by orderId
                value:
                  action:
                    type: cancelOrder
                    cancels:
                      - symbolCode: 1
                        ordId: "12345"
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
              byClOrdId:
                summary: Cancel by clOrdId
                value:
                  action:
                    type: cancelOrder
                    cancels:
                      - symbolCode: 1
                        clOrdId: "99001"
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            // Cancel by system order ID
            await client.cancelOrder({ symbolCode: 1, ordId: "12345" });

            // Cancel by client order ID
            await client.cancelOrder({ symbolCode: 1, clOrdId: "99001" });
        - lang: Python
          label: Python
          source: |
            # Cancel by system order ID
            client.cancel_order(symbol_code=1, ord_id="12345")

            # Cancel by client order ID
            client.cancel_order(symbol_code=1, cl_ord_id="99001")

  /exchange/cancelAll:
    post:
      operationId: cancelAll
      summary: Cancel All Orders
      tags: [Orders]
      description: |
        Cancel all orders for a symbol.

        **Signature:** Agent · **Protobuf:** `MsgCancelAll`

        ```protobuf
        message MsgCancelAll {
          int64 symbol_code          = 1;
          bool  is_conditional_order = 2;
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelAllRequest"
            examples:
              default:
                value:
                  action:
                    type: cancelAll
                    symbolCode: 1
                    conditionalOrder: false
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            await client.cancelAll({ symbolCode: 1 });

            // Cancel conditional orders only
            await client.cancelAll({ symbolCode: 1, conditional: true });
        - lang: Python
          label: Python
          source: |
            client.cancel_all(symbol_code=1)

            # Cancel conditional orders only
            client.cancel_all(symbol_code=1, conditional=True)

