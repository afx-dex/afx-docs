      summary: Set Leverage
      tags: [Account]
      description: |
        Set leverage for a symbol.

        **Signature:** Agent · **Protobuf:** `MsgSetLeverage`

        ```protobuf
        message MsgSetLeverage {
          int64  symbol_code = 1;
          string leverage    = 2;
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetLeverageRequest"
            examples:
              default:
                value:
                  action:
                    type: setLeverage
                    symbolCode: 1
                    leverage: "10"
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
