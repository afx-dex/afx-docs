      description: |
        Close a vault. Vault address via outer `vaultAddress` field.

        **Signature:** Agent · **Protobuf:** `MsgVaultClose`

        ```protobuf
        message MsgVaultClose {}  // empty message
        ```
      requestBody:
        required: true
        content:
          application/json:
            examples:
              default:
                value:
                  action:
                    type: vaultClose
