  # ═══════════════════════════════════════════════════════════════════
  #  Errors
  # ═══════════════════════════════════════════════════════════════════
  /errors:
    get:
      operationId: errorCodes
      summary: Error Codes
      tags: [Errors]
      description: |
        All Exchange API responses return a `code` field. `0` means success. Non-zero codes indicate an error.

        | Code | Description |
        | ---- | ----------- |
        | `0` | Success |
        | `40201` | Unsupported action type |
        | `40204` | Signature verification failed |
        | `40207` | Invalid nonce |
        | `40208` | Request expired |
        | `40220` | Rate limit exceeded |
      responses:
        "200":
          description: Reference only

# ═══════════════════════════════════════════════════════════════════
#  Components
# ═══════════════════════════════════════════════════════════════════
components:
  responses:
    ExchangeOk:
      description: Transaction submitted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ExchangeResponse"
          examples:
            success:
              value: { code: 0, message: success, data: { txHash: "0xabc...", txCode: 0, txMsg: "" } }

  schemas:
    Signature:
      type: object
      required: [r, s, v]
      properties:
        r: { type: string, description: "32-byte hex, zero-padded to 64 chars" }
        s: { type: string, description: "32-byte hex, zero-padded to 64 chars" }
        v: { type: integer, description: "27 or 28" }

    ExchangeResponse:
      type: object
      properties:
        code:
          type: integer
          description: "`0` = success. See Error Codes section for non-zero values."
          example: 0
        message: { type: string }
        data:
          type: object
          nullable: true
          properties:
            txHash: { type: string }
            txCode: { type: integer }
            txMsg: { type: string }

    PlaceOrderRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, orders]
          properties:
            type: { type: string, enum: [placeOrder] }
            orders:
              type: array
              minItems: 1
              items:
                type: object
                required: [symbolCode, ordPx, ordQty, ordType, ordSide, timeInForce]
                properties:
                  symbolCode: { type: integer, format: int64, example: 1 }
                  ordPx: { type: string, description: "Limit `> 0`, Market `\"0\"`" }
                  ordQty: { type: string }
                  ordType: { type: string, enum: [LIMIT, MARKET] }
                  ordSide: { type: string, enum: [BUY, SELL, BUY_CLOSE_HEDGE, SELL_CLOSE_HEDGE] }
                  timeInForce: { type: string, enum: [GTC, IOC, FOK, POST_ONLY] }
                  clOrdId: { type: integer, format: int64 }
                  parentOrdId: { type: integer, format: int64 }
                  reduce_only_option: { type: string, enum: [REDUCE_ONLY, TP_FROM_POSITION, SL_FROM_POSITION] }
                  triggerPx: { type: string }
                  tpslTriggerType: { type: string, enum: [LAST_PRICE, MARK_PRICE, INDEX_PRICE] }
                  slippagePct: { type: string }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }
        expiryAfter: { type: integer, format: int64, nullable: true }
        vaultAddress: { type: string, nullable: true }

    CancelOrderRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, cancels]
          properties:
            type: { type: string, enum: [cancelOrder] }
            cancels:
              type: array
              minItems: 1
              items:
                type: object
                required: [symbolCode]
                properties:
                  symbolCode: { type: string }
                  clOrdId: { type: string, description: "Client order ID (clOrdId or ordId required)" }
                  ordId: { type: string, description: "System order ID (clOrdId or ordId required)" }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }
        vaultAddress: { type: string, nullable: true }

    CancelAllRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, symbolCode]
          properties:
            type: { type: string, enum: [cancelAll] }
            symbolCode: { type: integer, format: int64 }
            conditionalOrder: { type: boolean, default: false }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }
        vaultAddress: { type: string, nullable: true }

    SetLeverageRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, symbolCode, leverage]
          properties:
            type: { type: string, enum: [setLeverage] }
            symbolCode: { type: integer, format: int64 }
            leverage: { type: string, description: ">= 1, max 2 decimal places" }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }
        vaultAddress: { type: string, nullable: true }

    SetMarginModeRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, symbolCode, marginMode]
          properties:
            type: { type: string, enum: [setMarginMode] }
            symbolCode: { type: integer, format: int64 }
            marginMode: { type: string, enum: [CROSS, ISOLATED] }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }
        vaultAddress: { type: string, nullable: true }

    AssignPosMarginRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, symbolCode, assignedPosMargin]
          properties:
            type: { type: string, enum: [assignPosMargin] }
            symbolCode: { type: integer, format: int64 }
            assignedPosMargin: { type: string, description: "Amount to assign (non-zero)" }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }
        vaultAddress: { type: string, nullable: true }

    ApproveAgentRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, agentAddress, agentName, dexChain]
          properties:
            type: { type: string, enum: [approveAgent] }
            agentAddress: { type: string, description: "Agent wallet address (0x hex)" }
            agentName: { type: string }
            dexChain: { type: string, enum: [Mainnet, Testnet] }
            referralCode: { type: string, description: "Referral code (only effective on first approve)" }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }
        expiryAfter: { type: integer, format: int64, nullable: true }

    WithdrawRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, destination, amount]
          properties:
            type: { type: string, enum: [withdraw] }
            destination: { type: string, description: "Recipient address (0x hex)" }
            amount: { type: string, description: ">= 1" }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }
        expiryAfter: { type: integer, format: int64, nullable: true }

    UsdSendRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, to, amount]
          properties:
            type: { type: string, enum: [usdSend] }
            to: { type: string, description: "Recipient address (0x hex)" }
            amount: { type: string, description: ">= 1" }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }
        expiryAfter: { type: integer, format: int64, nullable: true }

    BindReferralRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, referralCode]
          properties:
            type: { type: string, enum: [bindReferral] }
            referralCode: { type: string }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }

    VaultCreateRequest:
      type: object
      required: [action, signature, nonce]
      properties:
        action:
          type: object
          required: [type, name, description, amount, currencyCode]
          properties:
            type: { type: string, enum: [vaultCreate] }
            name: { type: string }
            description: { type: string }
            amount: { type: string, description: "Initial deposit amount" }
            currencyCode: { type: integer, format: int64 }
        signature: { $ref: "#/components/schemas/Signature" }
        nonce: { type: integer, format: int64 }
