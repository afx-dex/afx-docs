        Add or remove margin for an isolated position.

        **Signature:** Agent · **Protobuf:** `MsgAssignPosMargin`

        ```protobuf
        message MsgAssignPosMargin {
          int64  symbol_code        = 1;
          string assigned_pos_margin = 2;
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignPosMarginRequest"
            examples:
              default:
                value:
                  action:
                    type: assignPosMargin
                    symbolCode: 1
                    assignedPosMargin: "100"
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            await client.assignPosMargin({ symbolCode: 1, amount: "100" });
        - lang: Python
          label: Python
          source: |
            client.assign_pos_margin(symbol_code=1, amount="100")

  # ═══════════════════════════════════════════════════════════════════
  #  Master Signature Operations
  # ═══════════════════════════════════════════════════════════════════
  /exchange/approveAgent:
    post:
      operationId: approveAgent
      summary: Approve Agent
      tags: [Authorization]
      description: |
        Authorize an Agent wallet to trade on behalf of the Master wallet.

        **Signature:** Master · **No protobuf** — fields are signed directly via EIP-712.

        **EIP-712 type:**
        ```json
        {
          "ApproveAgent": [
            { "name": "dexChain",     "type": "string"  },
            { "name": "agentAddress", "type": "address" },
            { "name": "agentName",    "type": "string"  },
            { "name": "nonce",        "type": "uint64"  },
            { "name": "expiryAfter",  "type": "uint64"  }
          ]
        }
        ```
        Domain name: `"SignTransaction"`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveAgentRequest"
            examples:
              default:
                value:
                  action:
                    type: approveAgent
                    agentAddress: "0x76b6c4dc45f39463a1c8f6500c94b247c53fe184"
                    agentName: "my-trading-bot"
                    dexChain: "Mainnet"
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
                  expiryAfter: 1763023686
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            await client.approveAgent({ agentName: "my-trading-bot" });
        - lang: Python
          label: Python
          source: |
            client.approve_agent(agent_name="my-trading-bot")

  /exchange/withdraw:
    post:
      operationId: withdraw
      summary: Withdraw
      tags: [Authorization]
      description: |
        Withdraw funds from DEX to an external address.

        **Signature:** Master · **No protobuf**

        **EIP-712 type:**
        ```json
        {
          "Withdraw": [
            { "name": "dexChain",    "type": "string"  },
            { "name": "destination", "type": "address" },
            { "name": "amount",      "type": "string"  },
            { "name": "nonce",       "type": "uint64"  },
            { "name": "expiryAfter", "type": "uint64"  }
          ]
        }
        ```
        Domain name: `"SignTransaction"`. `dexChain` is determined by the server environment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawRequest"
            examples:
              default:
                value:
                  action:
                    type: withdraw
                    destination: "0xabc123..."
                    amount: "100"
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            await client.withdraw({ destination: "0xabc...", amount: "100" });
        - lang: Python
          label: Python
          source: |
            client.withdraw(destination="0xabc...", amount="100")

  /exchange/usdSend:
    post:
      operationId: usdSend
      summary: USD Transfer
      tags: [Authorization]
      description: |
        Transfer USD between DEX accounts.

        **Signature:** Master · **No protobuf**

        **EIP-712 type:**
        ```json
        {
          "UsdTransfer": [
            { "name": "dexChain",    "type": "string"  },
            { "name": "to",          "type": "address" },
            { "name": "amount",      "type": "string"  },
            { "name": "nonce",       "type": "uint64"  },
            { "name": "expiryAfter", "type": "uint64"  }
          ]
        }
        ```
        Domain name: `"SignTransaction"`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsdSendRequest"
            examples:
              default:
                value:
                  action:
                    type: usdSend
                    to: "0xabc123..."
                    amount: "50"
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            await client.usdSend({ to: "0xabc...", amount: "50" });
        - lang: Python
          label: Python
          source: |
            client.usd_send(to="0xabc...", amount="50")

