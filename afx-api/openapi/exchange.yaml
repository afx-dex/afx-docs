        **Signature:** Agent · **Protobuf:** `MsgBindReferral`

        ```protobuf
        // package: dex.offchain.referral.v1
        message MsgBindReferral {
          string referral_code = 1;
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindReferralRequest"
            examples:
              default:
                value:
                  action:
                    type: bindReferral
                    referralCode: "ABC123"
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            await client.bindReferral({ code: "ABC123" });
        - lang: Python
          label: Python
          source: |
            client.bind_referral(code="ABC123")

  # ═══════════════════════════════════════════════════════════════════
  #  Vault Operations
  # ═══════════════════════════════════════════════════════════════════
  /exchange/vaultCreate:
    post:
      operationId: vaultCreate
      summary: Create Vault
      tags: [Vault]
      description: |
        Create a new vault with initial deposit.

        **Signature:** Agent · **Protobuf:** `MsgVaultCreate`

        ```protobuf
        message MsgVaultCreate {
          string name          = 1;
          string description   = 2;
          string amount        = 3;
          int64  currency_code = 4;
        }
        ```

        Response `data` includes additional field `vault` — the newly created vault address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultCreateRequest"
            examples:
              default:
                value:
                  action:
                    type: vaultCreate
                    name: "My Vault"
                    description: "Automated trading vault"
                    amount: "1000"
                    currencyCode: 1
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
      responses:
        "200":
          description: Vault created
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: success }
                  data:
                    type: object
                    properties:
                      txHash: { type: string }
                      txCode: { type: integer }
                      txMsg: { type: string }
                      vault: { type: string, description: "New vault address" }
              examples:
                success:
                  value:
                    code: 0
                    message: success
                    data:
                      txHash: "0x..."
                      txCode: 0
                      txMsg: ""
                      vault: "0x4b90BBE5Bc03Bf8981b48f7aCb2ccCa271e6CCEd"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            const result = await client.vaultCreate({
              name: "My Vault", description: "Automated trading vault",
              amount: "1000", currencyCode: 1,
            });
            console.log(result.data.vault); // new vault address
        - lang: Python
          label: Python
          source: |
            result = client.vault_create(
                name="My Vault", description="Automated trading vault",
                amount="1000", currency_code=1,
            )
            print(result["data"]["vault"])  # new vault address

  /exchange/vaultCreateSubVault:
