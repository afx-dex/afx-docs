        Set margin mode for a symbol.

        **Signature:** Agent · **Protobuf:** `MsgSetMarginMode`

        ```protobuf
        message MsgSetMarginMode {
          int64              symbol_code = 1;
          PositionMarginMode margin_mode = 2;  // CROSS=1, ISOLATED=2
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMarginModeRequest"
            examples:
              default:
                value:
                  action:
                    type: setMarginMode
                    symbolCode: 1
                    marginMode: CROSS
                  signature: { r: "0x...", s: "0x...", v: 27 }
                  nonce: 1763023626904
      responses:
        "200":
          $ref: "#/components/responses/ExchangeOk"
      x-codeSamples:
        - lang: JavaScript
          label: JavaScript
          source: |
            await client.setMarginMode({ symbolCode: 1, mode: "CROSS" });
        - lang: Python
          label: Python
          source: |
            client.set_margin_mode(symbol_code=1, mode="CROSS")

  /exchange/assignPosMargin:
